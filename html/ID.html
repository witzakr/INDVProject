<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Department of Civil Communications — Identification</title>
<link rel="stylesheet" href="../style.css">
</head>
<body>

  <main class="screen" id="id-screen">
    <div class="id-card-flip" id="id-card-flip" tabindex="0" role="button" aria-pressed="false" aria-label="ID card, press to flip">
      <div class="id-card-inner">
        <article class="id-card id-card-front">
        <header class="id-header">
          <span class="id-issuer">United Demoratic States Government</span>
          <div class="id-header-marks">
            <img src="../img/DCCLOGOSMALL.png" alt="National Flag" class="id-flag">
            <img src="../img/FlagSmall.png" alt="Department Seal" class="id-seal">
          </div>
        </header>

        <div class="id-body">
          <div class="id-photo-frame" aria-hidden="true"></div>

          <div class="id-details">
            <img src="../img/watermark.png" alt="" class="id-watermark" id="id-watermark" aria-hidden="true">

            <p class="id-field"><strong>Affiliation</strong></p>
            <p class="id-value">Civilian</p>

            <p class="id-field"><strong>Agency Department</strong></p>
            <p class="id-value">Department of Civil Communications</p>

            <p class="id-field"><strong>Issued:</strong> <span id="id-issued"></span></p>
            <p class="id-field"><strong>Expires:</strong> <span id="id-expires"></span></p>
          </div>
        </div>

        <div class="id-name">
          <p id="id-last-name"></p>
          <p id="id-first-name"></p>
        </div>

        <footer class="id-footer">
          <span class="id-code" id="id-code"></span>
        </footer>
      </article>

      <article class="id-card id-card-back">
        <img src="../img/CoatOfArmsBig.png" alt="Logo" class="id-back-logo">
      </article>
      </div>
    </div>

    <div class="id-actions">
      <a href="../html/register.html" class="id-action-btn id-back-btn">Back</a>
      <button type="button" id="approve-btn" class="id-action-btn id-approve-btn">Approve</button>
      <a href="../html/shift.html" id="start-shift-btn" class="id-action-btn id-start-btn is-disabled" aria-disabled="true">Start Shift</a>
    </div>
  </main>

  <script src="../js/ID.js"></script>
  <script src="../js/typewriter.js"></script>
</body>
</html>
