<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Department of Civil Communications — Shift</title>
<link rel="stylesheet" href="../style.css">
</head>
<body>

  <main class="screen" id="shift-screen">
    <article class="article-card">
      <div class="article-row" data-element="headline">
        <section class="article-headline">
          <h1>Headline</h1>
        </section>
      </div>

      <div class="article-row" data-element="image">
        <section class="article-image">
          <p>Article Image</p>
        </section>
      </div>

      <div class="article-row" data-element="content">
        <section class="article-content">
          <p>Article Content</p>
        </section>
      </div>
    </article>

    <div class="stamp-selector">
      <button type="button" id="stamp-preview" class="stamp-preview" aria-label="Selected stamp"></button>
    </div>

    <footer class="screen-footer">
      <div class="stamps-drawer">
        <div class="stamps-popup" id="stamps-popup">
          <div class="stamps-rack">
            <button type="button" class="stamp-swatch stamp-red" aria-label="Red stamp"></button>
            <button type="button" class="stamp-swatch stamp-yellow" aria-label="Yellow stamp"></button>
            <button type="button" class="stamp-swatch stamp-green" aria-label="Green stamp"></button>
          </div>
        </div>

        <div class="stamps-shelf">
          <button type="button" id="stamps-toggle" class="stamps-toggle" aria-label="Toggle stamps" aria-expanded="false">&#8593;</button>
          <div class="stamps-panel">
            <span class="stamps-label">Stamps</span>
          </div>
        </div>
      </div>
    </footer>

    <div class="mini-id-card-flip" id="mini-id-card-flip" tabindex="0" role="button" aria-pressed="false" aria-label="ID card, press to flip">
      <div class="mini-id-card-inner">
        <article class="mini-id-card mini-id-card-front">
          <header class="id-header">
            <span class="id-issuer">United Demoratic States Government</span>
            <div class="id-header-marks">
              <img src="../img/DCCLOGOSMALL.png" alt="Department Seal" class="id-seal">
              <img src="../img/FlagSmall.png" alt="National Flag" class="id-flag">
            </div>
          </header>

          <div class="id-body">
            <div class="id-photo-frame" aria-hidden="true"></div>

            <div class="id-details">
              <img src="../img/Watermark.png" alt="" class="id-watermark is-approved" aria-hidden="true">

              <p class="id-field"><strong>Affiliation</strong></p>
              <p class="id-value">Civilian</p>

              <p class="id-field"><strong>Agency Department</strong></p>
              <p class="id-value">Department of Civil Communications</p>

              <p class="id-field"><strong>Issued:</strong> <span id="mini-id-issued"></span></p>
              <p class="id-field"><strong>Expires:</strong> <span id="mini-id-expires"></span></p>
            </div>
          </div>

          <div class="id-name">
            <p id="mini-id-last-name"></p>
            <p id="mini-id-first-name"></p>
          </div>

          <footer class="id-footer">
            <span class="id-code" id="mini-id-code"></span>
          </footer>
        </article>

        <article class="mini-id-card mini-id-card-back">
          <img src="../img/CoatOfArmsBig.png" alt="Logo" class="id-back-logo">
        </article>
      </div>
    </div>
  </main>

  <script src="../js/miniID.js"></script>
  <script src="../js/typewriter.js"></script>
  <script src="../js/shift.js"></script>
  <script src="../js/stamps.js"></script>
  <script src="../js/stamp-sound.js"></script>
  <script src="../js/ambience.js"></script>
</body>
</html>
